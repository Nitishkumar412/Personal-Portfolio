<!DOCTYPE html>
<html>
<head>
  <title>More Certificates</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: sans-serif;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>My Certificates</h1>

<div class="gallery">
  <img src="cert1.jpg">
  <img src="cert2.jpg">
  <img src="cert3.jpeg">
  <img src="cert4.png">
  <img src="cert5.png">
  <img src="cert6.png">
  <img src="cert7.jpeg">
  <img src="cert8.jpeg">
  <img src="cert9.png">
  <img src="cert10.jpg">
  <!-- <img src="cert11jpg"> -->
  <!-- <img src="cert12.jpg"> -->
  <!-- <img src="cert13.jpg"> -->
</div>

</body>
</html>
